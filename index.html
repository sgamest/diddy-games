<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diddys Arcade</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0c29;
  color: white;
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 280px;
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 12px;
  text-align: center;
  font-weight: bold;
  color: #ffd966;
  border-bottom: 1px solid #333;
}

input {
  padding: 10px;
  border: none;
  outline: none;
  background: #111;
  color: white;
}

.list {
  overflow-y: auto;
  flex: 1;
}

.game {
  padding: 10px;
  margin: 6px;
  background: #2a2a40;
  border-radius: 8px;
  cursor: pointer;
}

.game:hover {
  background: #3a3a5a;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  background: #111;
  padding: 10px;
  color: #ffd966;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar-right {
  display: flex;
  gap: 10px;
}

button {
  background: #2a2a40;
  color: white;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #3a3a5a;
}

iframe {
  flex: 1;
  border: none;
  background: white;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="header">🎮 Diddys Arcade</div>
  <input id="search" placeholder="Search games...">
  <div class="list" id="list">Loading...</div>
</div>

<div class="main">
  <div class="topbar">
    <span id="title">Select a game</span>

    <div class="topbar-right">
      <button onclick="fullscreenGame()">⛶ Fullscreen</button>
      <span>Arcade</span>
    </div>
  </div>

  <iframe id="frame"></iframe>
</div>

<script>
let games = [];

const list = document.getElementById("list");
const frame = document.getElementById("frame");
const title = document.getElementById("title");
const search = document.getElementById("search");

// Load games
async function loadGames() {
  try {
    const res = await fetch("games.json");
    games = await res.json();
    render(games);
  } catch (e) {
    list.innerHTML = "Failed to load games.json";
    console.error(e);
  }
}

// Render list
function render(data) {
  list.innerHTML = "";

  data.forEach(game => {
    const div = document.createElement("div");
    div.className = "game";
    div.textContent = game.name;

    div.onclick = async () => {
      title.textContent = game.name;

      let url = game.url;

      // ✅ REPO SUPPORT (only if defined)
      if (game.repo) {
        url = `https://rawcdn.githack.com/${game.repo}/main/index.html`;
        frame.src = url;
        return;
      }

      if (!url) {
        frame.srcdoc = "<h2 style='color:red'>No URL provided</h2>";
        return;
      }

      // ✅ If it's a normal HTML file (local or raw)
      if (url.endsWith(".html")) {
        frame.src = url;
        return;
      }

      // ✅ Fallback (ONLY for special inline/raw cases)
      try {
        const res = await fetch(url);
        const html = await res.text();

        if (!html || html.trim().length < 50) {
          frame.srcdoc = "<h2 style='color:red'>Failed to load game</h2>";
          return;
        }

        frame.srcdoc = html;
      } catch {
        frame.srcdoc = "<h2 style='color:red'>Error loading game</h2>";
      }
    };

    list.appendChild(div);
  });
}

// Fullscreen
function fullscreenGame() {
  if (!frame.src && !frame.srcdoc) {
    alert("Load a game first");
    return;
  }

  if (frame.requestFullscreen) frame.requestFullscreen();
  else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
}

// Search
search.addEventListener("input", () => {
  const term = search.value.toLowerCase();
  render(games.filter(g => g.name.toLowerCase().includes(term)));
});

loadGames();
</script>

</body>
</html>
