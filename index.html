<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.75">
<title>Science Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;
  --sidebar:#0c0c1a;
  --panel:#10101f;
  --lift:#16162a;
  --lift2:#1e1e35;
  --border:#1f1f3a;
  --accent:#f0c040;
  --accent2:#ff4d7d;
  --text:#ddddf5;
  --muted:#55557a;
  --font-hd:'Orbitron',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border);transition:.3s;overflow:hidden}
.sidebar.closed{width:0;min-width:0;opacity:0}
.sidebar-logo{padding:14px;display:flex;flex-direction:column;gap:4px;border-bottom:1px solid var(--border);cursor:pointer}
.logo-text{font-family:var(--font-hd);color:var(--accent);font-size:.8rem;font-weight:900;letter-spacing:2px}
.logo-sub{font-size:.55rem;color:var(--muted);letter-spacing:1px}
.search-box{padding:10px}
.search-box input{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);outline:none}
.game-list{flex:1;overflow:auto;padding:6px}
.game{padding:8px;border-radius:6px;cursor:pointer;color:#9090b8}
.game:hover{background:var(--lift)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--panel);display:flex;align-items:center;gap:10px;padding:0 12px;border-bottom:1px solid var(--border)}
.hamburger{width:34px;height:34px;background:var(--lift);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer}
.topbar-title{flex:1;font-family:var(--font-hd);color:var(--accent)}
.topbar-btn{background:var(--lift);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer}

/* PAGES */
.page{display:none;flex:1;overflow:auto;padding:26px}
.page.active{display:block}
iframe{flex:1;border:none;width:100%}

/* HOME */
.hero{margin-bottom:20px}
.hero h1{font-family:var(--font-hd);color:var(--accent)}
.hero p{color:var(--muted)}

/* BOOKMARKLETS */
.bm-wrap{max-width:700px;margin:auto}
.bm-card{background:var(--lift);border:1px solid var(--border);padding:12px;border-radius:10px;margin:10px 0}
.bm-card b{color:var(--accent)}
.bm-code{font-size:.75rem;color:var(--muted);word-break:break-all;margin-top:6px}
.bm-input{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text)}
.bm-btn{padding:8px 12px;background:var(--accent);border:none;border-radius:6px;font-weight:700;cursor:pointer}
.bm-status{font-size:.8rem;margin-top:6px;color:var(--muted)}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo" onclick="showHome()">
    <div class="logo-text">Science Arcade</div>
    <div class="logo-sub">v1.3.1</div>
  </div>
  <div class="search-box"><input id="search" placeholder="Search games..."></div>
  <div class="game-list" id="list"></div>
</div>

<div class="main">

  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="topbar-title" id="title">Home</div>
    <button class="topbar-btn" onclick="showHome()">Home</button>
    <button class="topbar-btn" onclick="showBookmarklets()">Bookmarklets</button>
  </div>

  <!-- HOME PAGE -->
  <div id="home" class="page active">
    <div class="hero">
      <h1>Science Arcade</h1>
      <p>Games + community tools</p>
    </div>
    <p>Select a game from the sidebar.</p>
  </div>

  <!-- GAME -->
  <div id="game" class="page">
    <iframe id="frame"></iframe>
  </div>

  <!-- BOOKMARKLETS PAGE (SEPARATE) -->
  <div id="bookmarklets" class="page">
    <div class="bm-wrap">
      <h2 style="font-family:var(--font-hd);color:var(--accent)">Bookmarklets</h2>
      <p style="color:var(--muted)">Submit and share tools with the community</p>

      <h3 style="margin-top:16px">Submit</h3>
      <input id="bm-name" class="bm-input" placeholder="Name">
      <textarea id="bm-code" class="bm-input" placeholder="javascript:..."></textarea>
      <button class="bm-btn" onclick="submitBookmarklet()">Submit</button>
      <div class="bm-status" id="bm-status"></div>

      <h3 style="margin-top:20px">Community</h3>
      <div id="bookmarklets-list"></div>
    </div>
  </div>

</div>

<script>
const GITHUB={owner:"YOUR_USERNAME",repo:"YOUR_REPO",token:"YOUR_PAT",bmPath:"bookmarklets.json"};

let games=[];
let bookmarklets=[];
let bmSha=null;

const listEl=document.getElementById("list");
const frame=document.getElementById("frame");
const titleEl=document.getElementById("title");

const pages={
 home:document.getElementById("home"),
 game:document.getElementById("game"),
 bm:document.getElementById("bookmarklets")
};

function showPage(name){
 Object.values(pages).forEach(p=>p.classList.remove("active"));
 pages[name].classList.add("active");
}

function showHome(){showPage("home");titleEl.textContent="Home"}
function showBookmarklets(){showPage("bm");titleEl.textContent="Bookmarklets";loadBM()}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("closed")}

async function loadBM(){
 try{
  const r=await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.bmPath}`);
  const d=await r.json();
  bookmarklets=JSON.parse(atob(d.content));
  bmSha=d.sha;
  renderBM();
 }catch(e){}
}

async function submitBookmarklet(){
 let n=document.getElementById("bm-name").value;
 let c=document.getElementById("bm-code").value;
 let s=document.getElementById("bm-status");
 if(!n||!c)return;
 if(!c.startsWith("javascript:"))c="javascript:"+c;
 bookmarklets.push({name:n,code:c});
 s.textContent="Saving...";
 const ok=await saveBM();
 s.textContent=ok?"Saved":"Failed";
 if(ok)renderBM();
}

async function saveBM(){
 const content=btoa(JSON.stringify(bookmarklets,null,2));
 try{
  const r=await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.bmPath}`,{method:"PUT",headers:{"Authorization":"token "+GITHUB.token},body:JSON.stringify({message:"update",content,sha:bmSha})});
  return r.ok;
 }catch(e){return false}
}

function renderBM(){
 const c=document.getElementById("bookmarklets-list");
 c.innerHTML="";
 bookmarklets.forEach(b=>{
  const d=document.createElement("div");
  d.className="bm-card";
  d.innerHTML=`<b>${b.name}</b><div class='bm-code'>${b.code}</div>`;
  c.appendChild(d);
 });
}
</script>

</body>
</html>
