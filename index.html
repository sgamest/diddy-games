<script>
let games = [];

const list = document.getElementById("list");
const frame = document.getElementById("frame");
const title = document.getElementById("title");
const search = document.getElementById("search");

// Load games
async function loadGames() {
  try {
    const res = await fetch("games.json");
    games = await res.json();
    render(games);

    // restore last played game
    const saved = localStorage.getItem("lastGame");
    if (saved) {
      const game = games.find(g => g.name === saved);
      if (game) loadGame(game);
    }

  } catch (e) {
    list.innerHTML = "Failed to load games.json";
  }
}

// Load a game
async function loadGame(game) {
  title.textContent = game.name;

  // SAVE game name
  localStorage.setItem("lastGame", game.name);

  try {
    const res = await fetch(game.url);
    const html = await res.text();

    if (!html || html.trim().length < 50) {
      frame.srcdoc = "<h2 style='color:red'>Failed to load game</h2>";
      return;
    }

    frame.srcdoc = html;

  } catch (err) {
    frame.srcdoc = "<h2 style='color:red'>Error loading game</h2>";
  }
}

// Render list
function render(data) {
  list.innerHTML = "";

  data.forEach(game => {
    const div = document.createElement("div");
    div.className = "game";
    div.textContent = game.name;

    div.onclick = () => loadGame(game);

    list.appendChild(div);
  });
}

// Fullscreen function
function fullscreenGame() {
  if (!frame.srcdoc && !frame.src) {
    alert("Load a game first");
    return;
  }

  if (frame.requestFullscreen) {
    frame.requestFullscreen();
  } else if (frame.webkitRequestFullscreen) {
    frame.webkitRequestFullscreen();
  } else if (frame.msRequestFullscreen) {
    frame.msRequestFullscreen();
  }
}

// Search
search.addEventListener("input", () => {
  const term = search.value.toLowerCase();
  render(games.filter(g => g.name.toLowerCase().includes(term)));
});

loadGames();
</script>
