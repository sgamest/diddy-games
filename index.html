<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.75">
<title>Diddy Games</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b0b1a;
  --sidebar-bg:#111128;
  --card:#1c1c38;
  --accent:#f5c842;
  --text:#e8e8ff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  display:flex;
  height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'Nunito';
}

.sidebar{
  width:260px;
  background:var(--sidebar-bg);
  overflow:auto;
}

.list{padding:10px;}

.game-item{
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}
.game-item:hover{background:var(--card);}

.main{flex:1;display:flex;flex-direction:column;}

.topbar{
  padding:10px;
  background:#0f0f22;
  display:flex;
  gap:10px;
}

#homepage{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

#game-container{
  flex:1;
  display:none;
  position:relative;
}
#game-container.active{display:flex;}

#frame{
  flex:1;
  border:none;
  width:100%;
  height:100%;
}

#loading{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  z-index:10;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="list" id="list">Loading...</div>
</div>

<div class="main">
  <div class="topbar">
    <button onclick="showHome()">Home</button>
  </div>

  <div id="homepage">
    <h1>🎮 Select a Game</h1>
  </div>

  <div id="game-container">
    <div id="loading">Loading...</div>
    <iframe id="frame" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups"></iframe>
  </div>
</div>

<script>
let games = [];
let currentBlobUrl = null;

const frame = document.getElementById("frame");
const list = document.getElementById("list");
const loading = document.getElementById("loading");
const homepage = document.getElementById("homepage");
const gameContainer = document.getElementById("game-container");

/* 🔥 Convert raw GitHub → jsDelivr */
function fixUrl(url){
  if(url.includes("raw.githubusercontent.com")){
    const parts = url.split("/");
    const user = parts[3];
    const repo = parts[4];
    const branch = parts[5];
    const path = parts.slice(6).join("/");
    return `https://cdn.jsdelivr.net/gh/${user}/${repo}@${branch}/${path}`;
  }
  return url;
}

/* Load game list */
async function loadGames(){
  const res = await fetch("games.json");
  games = await res.json();

  list.innerHTML="";
  games.forEach(g=>{
    const div=document.createElement("div");
    div.className="game-item";
    div.textContent=g.name;
    div.onclick=()=>launchGame(g);
    list.appendChild(div);
  });
}

/* Launch game (SMART LOADER) */
async function launchGame(game){
  homepage.style.display="none";
  gameContainer.classList.add("active");
  loading.style.display="flex";

  if(currentBlobUrl){
    URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl=null;
  }

  let url = fixUrl(game.url);

  try{
    // Try HEAD (size check)
    let size = 0;
    try{
      const head = await fetch(url,{method:"HEAD"});
      size = parseInt(head.headers.get("content-length")||"0");
    }catch{}

    // 🔥 BIG FILE → direct stream
    if(size > 15000000){
      frame.src = url;
    } else {
      // 🔧 SMALL FILE → blob for fixing paths
      const res = await fetch(url);
      let html = await res.text();

      const base = url.substring(0,url.lastIndexOf("/")+1);

      if(!html.includes("<base")){
        html = html.replace(/<head[^>]*>/i, m=>m+`<base href="${base}">`);
      }

      const blob = new Blob([html],{type:"text/html"});
      currentBlobUrl = URL.createObjectURL(blob);

      frame.src = currentBlobUrl;
    }

  }catch{
    // fallback
    frame.src = url;
  }

  frame.onload=()=>{
    loading.style.display="none";
    frame.contentWindow?.focus();
  };
}

/* Home */
function showHome(){
  homepage.style.display="flex";
  gameContainer.classList.remove("active");
}

/* Init */
loadGames();
</script>

</body>
</html>
